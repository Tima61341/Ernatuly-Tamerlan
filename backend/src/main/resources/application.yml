server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: QuizMaster
  
  datasource:
    url: jdbc:postgresql://localhost:5432/quizmaster
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

# JWT Configuration
jwt:
  secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9ycXVpem1hc3RlcmFwcGxpY2F0aW9uMTIzNDU2Nzg5MA==
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

# AI Configuration (Groq Cloud)
ai:
  groq:
    api-key: ${GROQ_API_KEY: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}
    api-url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.3-70b-versatile
    max-tokens: 2000
    temperature: 0.7

# Application Configuration
app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  game:
    max-players: 50
    default-timer: 30
    base-points: 1000
    speed-bonus-max: 500
  qr:
    width: 300
    height: 300
  avatar:
    styles:
      - adventurer
      - avataaars
      - big-ears
      - bottts
      - croodles
      - fun-emoji

# Logging
logging:
  level:
    com.quizmaster: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
